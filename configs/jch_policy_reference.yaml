# BSIM-83/84/85: Reference time-window scheduling policy for the jch workload.
#
# The jch workload (workloads/jch02.json) runs for 86400 s (24 h).
# All preprocess peak RAMs range from ~4 GB to ~85 GB, so a single RAM band
# per window is sufficient.  Two time windows model off-peak vs. peak load:
#
#   00:00 – 08:00  (0    – 28800 s)  off-peak:  slow spawn, aggressive drain
#   08:00 – 24:00  (28800 – 86400 s)  peak:      fast spawn, relaxed drain
#
# Instance registry: configs/jch_instance_registry_01.yaml
#   c7i.16xlarge  128 GB  64 vCPU  $2.856/hr   ← small jobs
#   m7i.16xlarge  256 GB  64 vCPU  $3.226/hr   ← large jobs (currently unused)
#   r7i.16xlarge  512 GB  64 vCPU  $4.032/hr   ← extra-large (currently unused)
#
# Drain rules (both windows):
#   If 32+ vCPU idle for 10 min → DRAINING  (node is under half load)
#   If 48+ vCPU idle for 3 min  → DRAINING  (node is almost empty)

scheduler_type: k8s
panic_threshold_seconds: 9000
sla_target_seconds: 6000
warmup_delay_seconds: 30
idle_timeout_seconds: 120
idle_check_interval_seconds: 30
max_retries: 3
replay_delay_seconds: 120
k8s_os_overhead_gb: 2.0

time_window_policy:
  - start_time_s: 0
    end_time_s: 28800         # 00:00 – 08:00
    queues:
      - exclusive_min_gb: 0
        inclusive_max_gb: 96
        spawn_instance_class: c7i.16xlarge
        spawn_rate_per_min: 0.5
        drain_rules:
          - idle_vcpu: 32
            duration_s: 600
          - idle_vcpu: 48
            duration_s: 180
      - exclusive_min_gb: 96
        inclusive_max_gb: 256
        spawn_instance_class: m7i.16xlarge
        spawn_rate_per_min: 0.5
        drain_rules:
          - idle_vcpu: 32
            duration_s: 600
          - idle_vcpu: 48
            duration_s: 180

  - start_time_s: 28800       # 08:00 – 24:00
    end_time_s: 86400
    queues:
      - exclusive_min_gb: 0
        inclusive_max_gb: 96
        spawn_instance_class: c7i.16xlarge
        spawn_rate_per_min: 2.0
        drain_rules:
          - idle_vcpu: 32
            duration_s: 1800
          - idle_vcpu: 56
            duration_s: 600
      - exclusive_min_gb: 96
        inclusive_max_gb: 256
        spawn_instance_class: m7i.16xlarge
        spawn_rate_per_min: 1.0
        drain_rules:
          - idle_vcpu: 32
            duration_s: 1800
          - idle_vcpu: 56
            duration_s: 600
