# configs/demo_centroids.yaml
# Two-centroid demo showcasing E14 features (BSIM-74/75/77):
#   - Discrete size-bin job model (centroid_bin_weights + bin_* arrays)
#   - Per-centroid time-window arrival overrides (time_windows)
#   - Explicit arrival_spacing selection
#
# Pair with configs/demo_k8splus_scheduler.yaml for E16 (time-window policy)
# and E17 (demand-based provisioning) coverage.
#
# Instance registry: configs/jch_instance_registry_01.yaml
#   c7i.16xlarge  128 GB  64 vCPU  $2.856/hr   <- Band 1 (light jobs, preload <= 32 GB)
#   m7i.16xlarge  256 GB  64 vCPU  $3.226/hr   <- Band 2 (heavy jobs, preload >  32 GB)

horizon_seconds: 28800      # 8-hour simulation window
random_seed: 42
cool_off_seconds: 1800       # 30-min tail; in-flight jobs finish after horizon
network_bandwidth_mbps: 10000

centroids:

  # ── light: Small analytics jobs, 3 size bins ──────────────────────────────
  # bin_preloader_hard_limit_gb: [8, 16, 32] GB
  # All three bins route to Band 1 (compute queue, c7i.16xlarge):
  #   max preload 32 GB << inclusive_max_gb 32 GB boundary in scheduler.
  # Arrival rate and size mix shift at the 4-hour mark (time_windows).
  - id: light
    label: "Light Analytics"
    description: >
      Short analytics jobs declared in three memory sizes (8/16/32 GB).
      Arrival rate halves overnight then ramps above baseline at 04:00.
      Size mix skews small overnight, shifts toward larger bins in the morning.

    # Required base fields; used as fallback if bin arrays are absent and
    # by build_phase_profile before bin overrides are applied.
    arrival_rate_per_hour: 4.0
    pareto_alpha: 2.5
    download_gb: 8.0
    preprocess_memory_exponent_a: 1.5
    preprocess_memory_exponent_b: 1.2
    preprocess_duration_seconds: 30
    io_wait_fraction: 0.20
    upload_gb: 2.0

    # Burst sizing: 1–3 same-type jobs per deploy event
    burst_size_min: 1
    burst_size_max: 3

    # E14 / BSIM-74: reduced-variance inter-arrival spacing.
    # Use "approximate" for predictable test runs; "poisson" (default) for
    # realistic burst clustering.
    arrival_spacing: approximate

    # E14 / BSIM-75: discrete size-bin model.
    # centroid_bin_weights present → sampler uses bin path, not Pareto path.
    centroid_bin_weights:           [5, 3, 2]   # normalises to CDF [0.50, 0.80, 1.00]
    bin_download_gb:                [2, 8, 20]
    bin_upload_gb:                  [0.5, 2.0, 5.0]
    bin_preprocess_duration_s:      [15, 30, 60]
    bin_preloader_hard_limit_gb:    [8, 16, 32]       # K8S RAM limit for preload phase
    bin_preloader_actual_gb:        [[4, 6], [9, 14], [18, 28]]  # uniform draw [lo, hi]
    bin_steady_state_hard_limit_gb: [4, 8, 16]        # K8S RAM limit for workhorse phase
    bin_steady_state_actual_gb:     [[2, 4], [4, 8], [8, 14]]
    bin_workhorse_scale:            [0.5, 1.0, 2.0]  # small=half duration; large=2x nominal

    # CPU: 2 parallel stages with distinct I/O profiles.
    # E17 / BSIM-87: effective_vcpu is computed dynamically each stage by the
    # cpu_boost solver and drives the stage timer — no extra config needed.
    workhorse_cpu_stages:         [300, 30, 600, 25]
    workhorse_soft_vcpu:          [2, 2]   # K8S CPU request (scheduler packs by this)
    workhorse_hard_vcpu:          [4, 8]   # burst ceiling = physical thread count per stage
    workhorse_io_wait_per_stage:  [0.30, 0.10]

    # E14 / BSIM-77: per-centroid time-window overrides.
    # Gaps outside these windows use the centroid baseline (4 bursts/hr, weights [5,3,2]).
    time_windows:
      - start_time_s: 0          # 00:00 – 04:00: quiet overnight
        end_time_s: 14400
        burst_rate: 2.0          # 0.5x baseline
        centroid_bin_weights: [7, 2, 1]   # 70% small overnight
      - start_time_s: 14400      # 04:00 – 08:00: morning ramp
        end_time_s: 28800
        burst_rate: 6.0          # 1.5x baseline
        centroid_bin_weights: [2, 4, 4]   # shift toward medium + large


  # ── heavy: Memory-intensive transform jobs, 2 size bins ───────────────────
  # bin_preloader_hard_limit_gb: [64, 128] GB
  # Both bins route to Band 2 (memory queue, m7i.16xlarge):
  #   min preload 64 GB > exclusive_min_gb 32 GB boundary in scheduler.
  # Constant arrival rate — no time_windows defined.
  - id: heavy
    label: "Heavy Transform"
    description: >
      Long-running memory-intensive transform jobs in two declared tiers
      (64 GB and 128 GB preload limit).  Arrival rate is constant throughout
      the simulation; size mix is 60% medium / 40% large.

    # Required base fields
    arrival_rate_per_hour: 1.5
    pareto_alpha: 2.0
    download_gb: 30.0
    preprocess_memory_exponent_a: 1.0
    preprocess_memory_exponent_b: 1.0
    preprocess_duration_seconds: 45
    io_wait_fraction: 0.10
    upload_gb: 4.0

    # Burst sizing: 2–5 jobs per deploy event
    burst_size_min: 2
    burst_size_max: 5

    # E14 / BSIM-74: exact memoryless Poisson (default; shown explicitly for clarity)
    arrival_spacing: poisson

    # E14 / BSIM-75: discrete size-bin model
    centroid_bin_weights:           [3, 2]     # normalises to CDF [0.60, 1.00]
    bin_download_gb:                [30, 60]
    bin_upload_gb:                  [4, 12]
    bin_preprocess_duration_s:      [45, 90]
    bin_preloader_hard_limit_gb:    [48, 62]
    bin_preloader_actual_gb:        [[40, 58], [90, 120]]
    bin_steady_state_hard_limit_gb: [32, 32]
    bin_steady_state_actual_gb:     [[10, 24], [20, 30]]
    bin_workhorse_scale:            [1.0, 2.5]

    # CPU: 2 parallel stages, mostly compute-bound (low io_wait)
    workhorse_cpu_stages:         [800, 60, 1400, 40]
    workhorse_soft_vcpu:          [4, 4]
    workhorse_hard_vcpu:          [8, 16]
    workhorse_io_wait_per_stage:  [0.05, 0.15]

    # No time_windows: constant arrival rate throughout simulation
