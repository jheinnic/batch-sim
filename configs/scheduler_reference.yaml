scheduler_type: k8s
panic_threshold_seconds: 9000
sla_target_seconds: 6000
warmup_delay_seconds: 30
idle_timeout_seconds: 120
idle_check_interval_seconds: 30
max_retries: 3
replay_delay_seconds: 120
k8s_os_overhead_gb: 2.0
scale_out_threshold_s: 0.0   # seconds a job must wait before scale-out fires (0 = immediate)
scale_out_poll_s: 60.0       # cooldown between successive node launches
