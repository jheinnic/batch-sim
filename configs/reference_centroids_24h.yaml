# reference_centroids_24h.yaml — BSIM-49: 24-hour simulation with diurnal arrival pattern
#
# Arrival rates are base rates (hours 9-17 peak).
# The experiment runner applies the multiplier_by_hour scaling below.
# multiplier_by_hour: 24 values, one per hour starting at midnight (hour 0).
# Trough = 0.1 (overnight), ramp up morning, peak 1.0 business hours, ramp down evening.

horizon_seconds: 86400
random_seed: 42
network_bandwidth_mbps: 500

arrival_multiplier_by_hour:
  [0.10, 0.08, 0.07, 0.07, 0.08, 0.12,   # 00-05 (overnight trough)
   0.22, 0.45, 0.72, 0.90, 1.00, 1.00,   # 06-11 (morning ramp + peak)
   1.00, 1.00, 0.98, 0.95, 0.88, 0.75,   # 12-17 (peak + early evening drop)
   0.55, 0.38, 0.28, 0.20, 0.15, 0.12]   # 18-23 (evening taper)

centroids:

  - id: centroid_a
    label: "Small / Short"
    description: "Lightweight quick-turnaround jobs."
    arrival_rate_per_hour: 24
    pareto_alpha: 2.5
    download_gb: 5.0
    preprocess_memory_exponent_a: 1.2
    preprocess_memory_exponent_b: 1.4
    preprocess_duration_seconds: 30
    workhorse_cpu_stages: [120, 20, 180, 15]
    workhorse_thread_counts: [4, 4]
    io_wait_fraction: 0.30
    upload_gb: 0.5

  - id: centroid_b
    label: "Memory-Heavy"
    description: "High peak memory, moderate workhorse."
    arrival_rate_per_hour: 15
    pareto_alpha: 2.0
    download_gb: 40.0
    preprocess_memory_exponent_a: 1.5
    preprocess_memory_exponent_b: 1.6
    preprocess_duration_seconds: 55
    workhorse_cpu_stages: [300, 30, 600, 25, 300, 20]
    workhorse_thread_counts: [8, 8, 8]
    io_wait_fraction: 0.25
    upload_gb: 4.0

  - id: centroid_c
    label: "Compute-Heavy"
    description: "Long multi-stage CPU-bound jobs."
    arrival_rate_per_hour: 15
    pareto_alpha: 2.2
    download_gb: 12.0
    preprocess_memory_exponent_a: 1.1
    preprocess_memory_exponent_b: 1.3
    preprocess_duration_seconds: 40
    workhorse_cpu_stages: [600, 45, 1200, 30, 900, 40, 600, 25]
    workhorse_thread_counts: [16, 16, 16, 16]
    io_wait_fraction: 0.20
    upload_gb: 1.2

  - id: centroid_d
    label: "Balanced"
    description: "General-purpose moderate batch workloads."
    arrival_rate_per_hour: 6
    pareto_alpha: 2.8
    download_gb: 20.0
    preprocess_memory_exponent_a: 1.3
    preprocess_memory_exponent_b: 1.5
    preprocess_duration_seconds: 45
    workhorse_cpu_stages: [400, 35, 800, 30, 400, 25]
    workhorse_thread_counts: [8, 8, 8]
    io_wait_fraction: 0.28
    upload_gb: 2.0
